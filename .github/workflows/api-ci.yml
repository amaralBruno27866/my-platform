name: API CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run -w apps/api build

      - name: Run API tests with coverage gate
        run: npm run -w apps/api test:coverage
